version: "3.9"

services:
  python:
    image: python:3.12-slim
    container_name: h2-python
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: >
      bash -c "pip install --upgrade pip &&
      pip install -e .[dev,llm-local,zenodo,viz] &&
      python -m src.simulation.iterate --seed 20260525 --iterations 32 &&
      python -m src.vvuq.gate_registry --iterations-dir data/iterations"
    environment:
      COMPARE_AGENT_BACKEND: ollama
      PYTHONUNBUFFERED: 1

  rust:
    image: rust:1.83-slim
    container_name: h2-rust
    working_dir: /workspace/src/simulation
    volumes:
      - ./:/workspace
    command: bash -c "cargo build --release && ./target/release/runner --seed 20260525 --iterations 32"

  duckdb:
    image: datacatering/duckdb:latest
    container_name: h2-duckdb
    working_dir: /workspace/data/iterations
    volumes:
      - ./data/iterations:/workspace/data/iterations
    command: ["duckdb", "-c", "SELECT 42 AS ok;"]

  ollama:
    image: ollama/ollama:latest
    container_name: h2-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_MODELS: /root/.ollama/models

volumes:
  ollama-data:
...
