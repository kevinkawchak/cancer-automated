# Frozen project parameters for the VVUQ-02 H2-Surgical 1.0 humanoid Whipple
# simulation. These values are part of the deterministic seed contract and must
# not change between iterations or across re-generations from the same seed.
#
# Lineage: this codegen tree was generated by Claude Code Opus 4.7 1M Max from
# the instruction set at papers/VVUQ-02/instructions/output-instruct.md, which
# was itself the prior Claude Code Opus 4.7 1M Max output produced from
# papers/VVUQ-02/instructions/prompt-instruct.md.

project:
  name: vvuq-02-h2-surgical
  version: 0.1.0
  release_date: 2026-05-26
  repository_release: v0.7.0
  parent_instructions: papers/VVUQ-02/instructions/output-instruct.md
  prior_prompt: papers/VVUQ-02/instructions/prompt-instruct.md
  upstream_vvuq01: papers/VVUQ-01/
  upstream_pdac: robotic-surgeries/2030-pdac-1min/paper/

# Real-world external standards the assurance layer is built against. Every VVUQ
# gate in config/vvuq_thresholds.yaml binds to one or more of these anchors via
# config/standards_map.yaml.
standards:
  model_credibility:
    - id: ASME_V_and_V_40_2018
      title: Assessing Credibility of Computational Modeling through Verification and Validation, Application to Medical Devices
    - id: ASME_V_and_V_10_2006
      title: Verification and Validation in Computational Solid Mechanics
    - id: ASME_V_and_V_20_2009
      title: Verification and Validation in Computational Fluid Dynamics and Heat Transfer
    - id: NASA_STD_7009A
      title: Standard for Models and Simulations
    - id: FDA_CMS_Credibility_2023
      title: Assessing the Credibility of Computational Modeling and Simulation in Medical Device Submissions
  robotic_surgery:
    - id: IEC_80601_2_77_2019
      title: Particular Requirements for the Basic Safety and Essential Performance of Robotically Assisted Surgical Equipment
    - id: IEC_60601_1_2005_AMD2_2020
      title: Medical Electrical Equipment, General Requirements for Basic Safety and Essential Performance
  service_robot_safety:
    - id: ISO_13482_2014
      title: Robots and Robotic Devices, Safety Requirements for Personal Care Robots
    - id: ISO_10218_1_2011
      title: Robots and Robotic Devices, Safety Requirements for Industrial Robots, Part 1
    - id: ISO_TS_15066_2016
      title: Robots and Robotic Devices, Collaborative Robots, Biomechanical Limits
    - id: ISO_9283_1998
      title: Manipulating Industrial Robots, Performance Criteria and Related Test Methods
  software_and_risk:
    - id: IEC_62304_2006_AMD1_2015
      title: Medical Device Software, Software Life Cycle Processes
    - id: ISO_14971_2019
      title: Application of Risk Management to Medical Devices
    - id: ISO_13849_1_2023
      title: Safety of Machinery, Safety-Related Parts of Control Systems
  autonomy:
    - id: UL_4600_2023
      title: Standard for Safety for the Evaluation of Autonomous Products
    - id: IEEE_7009_2024
      title: Standard for Fail-Safe Design of Autonomous and Semi-Autonomous Systems

seed:
  root: 20260525
  iteration_offset: 0
  iterations: 32
  per_iteration_seed_formula: root_seed + iteration_index
  design: latin_hypercube

# Reused verbatim from the PDAC 8-arm baseline so the single-humanoid run is
# directly comparable. The only change versus the baseline is the actuator.
patient:
  id: PAT-PDAC-0001
  age_years: 68
  sex: M
  ecog: 1
  bmi_kg_m2: 26.4
  diagnosis: pancreatic_ductal_adenocarcinoma
  tumor_location: head_of_pancreas
  tumor_diameter_cm: 3.4
  vascular_abutment_vessel: superior_mesenteric_vein
  vascular_abutment_degrees: 75
  resectability_nccn_2026: borderline_resectable
  kras_mutation: G12D
  microsatellite_status: MSI_stable
  ca_19_9_at_diagnosis_u_per_ml: 412
  ca_19_9_after_neoadjuvant_u_per_ml: 78
  neoadjuvant_regimen: modified_FOLFIRINOX_4_cycles
  neoadjuvant_response: partial_response_RECIST_1_1
  fistula_risk_score_preop: 5

procedure:
  name: pancreaticoduodenectomy_whipple
  pylorus_preservation: true
  artery_first_uncinate: true
  portomesenteric_resection_as_needed: true
  duration_seconds: 60
  phase_count: 8
  anastomosis_count: 3

timing:
  command_rate_hz: 10000
  force_rate_hz: 100000
  balance_recovery_bandwidth_hz: 200
  watchdog_deadline_us: 100
  hand_arm_estop_ms: 3
  joint_park_us: 50
  proximity_hard_stop_us: 10
  total_ticks_command: 600000
  total_ticks_force: 6000000

# Unitree H2-Surgical 1.0 (hypothetical 2030 surgical variant). The base form
# factor traces to the real H2 bipedal humanoid lineage; every clinical-grade
# capability uplift below is explicitly flagged hypothetical 2030 and paper-only.
robot:
  platform: H2_Surgical_1_0
  platform_status: hypothetical_2030_surgical_variant
  base_lineage: unitree_h2_real_bipedal_humanoid
  morphology: bipedal_humanoid_standing_at_table
  arms: 2
  dof_per_arm: 7
  hands: 2
  fingers_per_hand: 5
  joints_per_finger: 4
  dof_per_hand: 20
  stance_dof: 15
  head_dof: 2
  total_dof: 71
  fingertip_positioning_accuracy_mm_rms: 0.05
  fingertip_force_resolution_n: 0.01
  per_fingertip_force_soft_n: 2.5
  per_fingertip_force_hard_n: 3.0
  bimanual_cumulative_force_soft_n: 5.0
  bimanual_cumulative_force_hard_n: 6.0
  balance_support_polygon_margin_floor_mm: 8.0
  control_command_rate_khz: 10
  force_sample_rate_khz: 100

sensor_stack:
  head_stereo_rgb_channels: 6
  nir_icg_channels: 4
  endoscopic_channels: 4
  ultrasound_b_mode_elements: 8
  bile_spectrophotometry_channels: 4
  per_hand_finger_joint_channels: 40
  per_hand_finger_force_channels: 20
  balance_channels: 12
  force_sample_rate_hz: 100000
  command_sample_rate_hz: 10000

# 8-phase 60-second timeline reused from the PDAC baseline. active_hands maps the
# parallel-arm baseline activity onto the two dexterous humanoid hands; L is the
# left hand, R the right hand. Stance, head, and balance run every phase.
phases:
  - id: 1
    name: exploration_kocher
    start_s: 0.000
    end_s: 6.000
    duration_s: 6.0
    active_hands: [L, R]
  - id: 2
    name: vascular_control_venous_dissection
    start_s: 6.000
    end_s: 16.000
    duration_s: 10.0
    active_hands: [L, R]
  - id: 3
    name: uncinate_dissection_artery_first
    start_s: 16.000
    end_s: 24.000
    duration_s: 8.0
    active_hands: [L, R]
  - id: 4
    name: specimen_removal_en_bloc
    start_s: 24.000
    end_s: 32.000
    duration_s: 8.0
    active_hands: [L, R]
  - id: 5
    name: pancreaticojejunostomy
    start_s: 32.000
    end_s: 42.000
    duration_s: 10.0
    active_hands: [L, R]
  - id: 6
    name: hepaticojejunostomy
    start_s: 42.000
    end_s: 48.000
    duration_s: 6.0
    active_hands: [L, R]
  - id: 7
    name: gastrojejunostomy
    start_s: 48.000
    end_s: 54.000
    duration_s: 6.0
    active_hands: [L, R]
  - id: 8
    name: hemostasis_drain_withdrawal
    start_s: 54.000
    end_s: 60.000
    duration_s: 6.0
    active_hands: [L, R]

# The 10 humanoid-specific VVUQ gates. Full thresholds live in
# config/vvuq_thresholds.yaml; full specification in docs/vvuq_gate_spec.md.
vvuq_gates:
  - {id: "01", slug: bimanual-handeye-servo, immediate_catastrophe: false}
  - {id: "02", slug: dexterous-finger-force, immediate_catastrophe: false}
  - {id: "03", slug: whole-body-balance, immediate_catastrophe: false}
  - {id: "04", slug: autonomous-plan-correctness, immediate_catastrophe: false}
  - {id: "05", slug: instrument-grasp-handover, immediate_catastrophe: false}
  - {id: "06", slug: vascular-no-fly-hand, immediate_catastrophe: true}
  - {id: "07", slug: bimanual-suturing-anastomosis, immediate_catastrophe: false}
  - {id: "08", slug: perception-scene-understanding, immediate_catastrophe: false}
  - {id: "09", slug: shared-or-human-collision, immediate_catastrophe: true}
  - {id: "10", slug: fault-estop-graceful-degradation, immediate_catastrophe: true}

composite_score_weights:
  quality: 0.30
  time: 0.20
  cost: 0.15
  safety: 0.15
  patient_experience: 0.05
  anastomosis_quality: 0.15
...
