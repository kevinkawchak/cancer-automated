# Three anastomosis ring-tension targets for the autonomous H2-Surgical Whipple.
# Targets reused verbatim from the PDAC 8-arm baseline so the bimanual humanoid
# run is directly comparable. Ring tension is held within plus or minus 0.05 N at
# the 10 kHz sample rate; drift outside the band for more than 100 ms logs a
# violation. Gated by VVUQ 07 (bimanual-suturing-anastomosis). Locations in the
# patient frame in mm. active_hands maps the baseline arm pairs onto the two hands.

anastomoses:
  - id: pancreaticojejunostomy
    technique: duct_to_mucosa
    phase: 5
    start_s: 32.000
    end_s: 42.000
    duration_s: 10.0
    location: {x_mm: 18.0, y_mm: -30.0, z_mm: -42.0}
    ring_tension_target_n: 0.45
    ring_tension_tolerance_n: 0.05
    manometry_target_mmHg: 12.0
    manometry_tolerance_mmHg: 2.0
    active_hands: [L, R]
    suture_layers:
      - {name: outer_layer, count: 4, suture: 5-0_Prolene, start_s: 32.000, end_s: 35.500}
      - {name: duct_to_mucosa, count: 8, suture: 6-0_Prolene, start_s: 35.500, end_s: 39.500}
      - {name: inner_layer, count: 4, suture: 5-0_Prolene, start_s: 39.500, end_s: 41.500}
    realized_grades: [A, B, C]
  - id: hepaticojejunostomy
    technique: end_to_side
    phase: 6
    start_s: 42.000
    end_s: 48.000
    duration_s: 6.0
    location: {x_mm: 12.0, y_mm: -50.0, z_mm: -48.0}
    ring_tension_target_n: 0.50
    ring_tension_tolerance_n: 0.05
    manometry_target_mmHg: 8.0
    manometry_tolerance_mmHg: 2.0
    active_hands: [L, R]
    suture_layers:
      - {name: posterior_layer, count: 6, suture: 5-0_PDS, start_s: 42.000, end_s: 44.500}
      - {name: anterior_layer, count: 6, suture: 5-0_PDS, start_s: 44.500, end_s: 47.000}
    realized_grades: [absent, present]
  - id: gastrojejunostomy
    technique: antecolic_pylorus_preserving
    phase: 7
    start_s: 48.000
    end_s: 54.000
    duration_s: 6.0
    location: {x_mm: -8.0, y_mm: -40.0, z_mm: -30.0}
    ring_tension_target_n: 0.60
    ring_tension_tolerance_n: 0.05
    manometry_target_mmHg: 0.0
    manometry_tolerance_mmHg: 0.0
    active_hands: [L, R]
    suture_layers:
      - {name: stapler_fire, count: 1, suture: 60mm_linear, start_s: 48.000, end_s: 50.000}
      - {name: posterior_reinforcement, count: 4, suture: 4-0_Vicryl, start_s: 50.000, end_s: 52.000}
      - {name: anterior_reinforcement, count: 4, suture: 4-0_Vicryl, start_s: 52.000, end_s: 53.500}
    realized_grades: [patent, delayed]

fistula_risk_score:
  inputs:
    gland_texture: {soft: 2, firm: 0}
    pathology: {PDAC: 0, other: 1}
    duct_diameter_mm: {model: linear_decreasing, at_1mm: 4, at_5mm: 0}
    estimated_blood_loss_ml: {model: linear_increasing, at_0ml: 0, at_1000ml: 4}
  risk_categories:
    negligible: {range: [0, 2], leak_probability: "<1%"}
    moderate: {range: [3, 6], leak_probability: "5-10%"}
    high: {range: [7, 10], leak_probability: "15-25%"}
  patient_pat_pdac_0001:
    gland_texture: soft
    pathology: PDAC
    duct_diameter_mm: 3.2
    estimated_blood_loss_ml: 200
    total: 5
    category: moderate
...
