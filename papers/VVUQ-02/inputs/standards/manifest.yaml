# Machine-readable index of the real-world standards the VVUQ-02 assurance layer
# is built against. Loaded at runtime by codegen/src/vvuq/gate_registry.py and
# mirrored in codegen/config/standards_map.yaml. Designations and titles are
# factual references to published consensus standards; normative text is the
# property of the issuing bodies (ASME, IEC, ISO, NASA, UL, IEEE, FDA).

corpus_version: "0.1.0"

standards:
  - key: ASME_V_and_V_40_2018
    designation: ASME V&V 40-2018
    body: ASME
    title: Assessing Credibility of Computational Modeling through Verification and Validation, Application to Medical Devices
    used_for: model risk, context of use, credibility goals proportional to risk
    summary_file: asme_vv40_2018.md
  - key: NASA_STD_7009A
    designation: NASA-STD-7009A
    body: NASA
